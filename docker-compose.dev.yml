version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: vnav-backend-dev
    restart: unless-stopped
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/vnav_dev.db
      - JWT_SECRET_KEY=dev_super_secret_key_123
      - ENVIRONMENT=development
    volumes:
      - ./backend:/app
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8000:8000"
    networks:
      - vnav-dev-network

  frontend:
    image: node:20-alpine
    container_name: vnav-frontend-dev
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    volumes:
      - ./frontend:/app
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - vnav-dev-network

networks:
  vnav-dev-network:
    driver: bridge
