services:
  frontend:
    build:
      context: ./frontend
    container_name: vnav-console-frontend
    ports:
      - "80:80"
    restart: unless-stopped
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    container_name: vnav-console-backend
    ports:
      - "8000:8000"
    environment:
      # P1: CORS - set to your real domain in production
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://localhost:5173,http://192.168.1.10
      # P0: Set a strong secret to protect WebSocket terminal/logs endpoints
      # Leave empty for local-only dev mode (no auth). SET THIS IN PRODUCTION.
      - WS_SECRET_TOKEN=
      # P2: Thread pool size for blocking Docker SDK calls
      - THREAD_POOL_MAX_WORKERS=200
      # P2: WebSocket idle timeout in seconds (600 = 10 minutes)
      - WS_IDLE_TIMEOUT_SECONDS=600
      # P1: Data directory (matches volume mount below)
      - DATA_DIR=/app/data
      # P1: Gateway routes persistence path
      - GATEWAY_ROUTES_PATH=/app/data/gateway_routes.json
    volumes:
      # DooD: Mount Docker socket so backend can manage containers
      - /var/run/docker.sock:/var/run/docker.sock
      # P1: Named volume for SQLite DB + gateway route persistence
      - backend_data:/app/data
      # Legacy volume mount (keep for compatibility)
      - ./core-infra:/app/core-infra
    restart: unless-stopped
    # P3: Health check — uses Python (always available) instead of curl (not in slim image)
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

volumes:
  # P1: Named volume ensures SQLite and gateway routes survive container restarts
  backend_data:
    driver: local
