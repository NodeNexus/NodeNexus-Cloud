version: "3.8"

networks:
  frontend-net:
    driver: bridge
  backend-net:
    driver: bridge
  data-net:
    driver: bridge
  monitoring-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
  loki_data:
  portainer_data:
  minio_data:
  mqtt_data:
  mqtt_log:
  nodered_data:
  uptime_kuma_data:

services:
  # ================= REVERSE PROXY =================
  nginx:
    image: nginx:alpine
    container_name: vnav_nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - frontend-net
      - backend-net
      - monitoring-net
    depends_on:
      - frontend
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================= APPLICATION =================
  frontend:
    build: 
      context: ./frontend
    container_name: vnav_frontend
    networks:
      - frontend-net
    restart: unless-stopped

  backend:
    build:
      context: ./backend
    container_name: vnav_backend
    environment:
      - DATABASE_URL=${DATABASE_URL:-postgresql+asyncpg://vnav:vnav_secure_password@postgres:5432/vnav_db}
      - SECRET_KEY=${SECRET_KEY:-super_secret_key_change_me}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    networks:
      - frontend-net
      - backend-net
      - data-net
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ================= DATA =================
  postgres:
    image: postgres:15-alpine
    container_name: vnav_postgres
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-vnav}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-vnav_secure_password}
      - POSTGRES_DB=${POSTGRES_DB:-vnav_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vnav}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: vnav_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_secure_password}
    volumes:
      - redis_data:/data
    networks:
      - data-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ================= MONITORING =================
  prometheus:
    image: prom/prometheus:latest
    container_name: vnav_prometheus
    volumes:
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - monitoring-net
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: vnav_grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GF_SECURITY_ADMIN_PASSWORD:-grafana_admin_password}
      - GF_USERS_ALLOW_SIGN_UP=${GF_USERS_ALLOW_SIGN_UP:-false}
      - GF_SERVER_ROOT_URL=%(protocol)s://%(domain)s/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - monitoring-net
    depends_on:
      - prometheus
      - loki
    restart: unless-stopped

  loki:
    image: grafana/loki:latest
    container_name: vnav_loki
    volumes:
      - loki_data:/loki
    command: -config.file=/etc/loki/local-config.yaml
    networks:
      - monitoring-net
    restart: unless-stopped

  # ================= MANAGEMENT & TOOLS =================
  portainer:
    image: portainer/portainer-ce:latest
    container_name: vnav_portainer
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - monitoring-net
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: vnav_minio
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-admin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minio_admin_password}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    networks:
      - data-net
    restart: unless-stopped

  mqtt:
    image: eclipse-mosquitto:latest
    container_name: vnav_mqtt
    volumes:
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    networks:
      - backend-net
    restart: unless-stopped

  node-red:
    image: nodered/node-red:latest
    container_name: vnav_nodered
    volumes:
      - nodered_data:/data
    networks:
      - backend-net
      - data-net
    restart: unless-stopped

  uptime-kuma:
    image: louislam/uptime-kuma:1
    container_name: vnav_uptime_kuma
    volumes:
      - uptime_kuma_data:/app/data
    networks:
      - monitoring-net
    restart: unless-stopped
