services:
  traefik:
    image: traefik:v2.10
    container_name: vnav-traefik
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    labels:
      - "vnav.service=api-gateway"

  minio:
    image: minio/minio:latest
    container_name: vnav-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    labels:
      - "vnav.service=s3"

  coredns:
    image: coredns/coredns:latest
    container_name: vnav-coredns
    command: -conf /etc/coredns/Corefile
    volumes:
      - ./coredns/Corefile:/etc/coredns/Corefile
    ports:
      - "53:53/udp"
    labels:
      - "vnav.service=route53"

volumes:
  minio_data:

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: vnav-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    labels:
      - "vnav.service=sqs-sns"

  prometheus:
    image: prom/prometheus:latest
    container_name: vnav-prometheus
    ports:
      - "9090:9090"
    labels:
      - "vnav.service=cloudwatch"

  grafana:
    image: grafana/grafana:latest
    container_name: vnav-grafana
    ports:
      - "3000:3000"
    labels:
      - "vnav.service=cloudwatch-dashboard"
